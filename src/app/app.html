<!-- On ajoute la classe "est-valide" uniquement quand estValide est vrai -->
<main class="container" [class.est-valide]="estValide">
  <!-- Colonne de gauche : Le Formulaire -->
  <section class="form-section">
    <h2>Nouveau Profil</h2>
    
    <form #monForm="ngForm" (ngSubmit)="valider()">
      <div class="field">
        <label>Nom :</label>
        <input type="text" [(ngModel)]="utilisateur.nom" name="nom" required>
      </div>

      <div class="field">
        <label>Prénom :</label>
        <input type="text" [(ngModel)]="utilisateur.prenom" name="prenom" required>
      </div>

      <div class="field">
        <label>Sexe :</label>
        <div class="radio-group">
          <input type="radio" [(ngModel)]="utilisateur.sexe" name="sexe" value="Masculin"> M
          <input type="radio" [(ngModel)]="utilisateur.sexe" name="sexe" value="Féminin"> F
        </div>
      </div>

      <div class="field">
        <label>Fonction :</label>
        <select [(ngModel)]="utilisateur.fonction" name="fonction" required>
          @for (metier of fonctions; track metier) {
            <option [value]="metier">{{ metier }}</option>
          }
        </select>
      </div>

      <button type="submit" [disabled]="monForm.invalid">Valider et Afficher</button>
    </form>
  </section>

  <!-- Partie Droite : N'existe QUE si on valide -->
  @if (estValide) {
    <section class="result-section">
      <h2>Données saisies</h2>
      
        <div class="card">
          <p><strong>Nom :</strong> {{ utilisateur.nom }}</p>
          <p><strong>Prénom :</strong> {{ utilisateur.prenom }}</p>
          <p><strong>Sexe :</strong> {{ utilisateur.sexe }}</p>
          <p><strong>Fonction :</strong> {{ utilisateur.fonction }}</p>
          <button (click)="modifier()" class="btn-modifier">Modifier les infos</button>
        </div>
    </section>
  }

</main>
